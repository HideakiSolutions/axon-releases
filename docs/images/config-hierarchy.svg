<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="900" height="340" viewBox="0 0 900 340">
  <!-- Background -->
  <rect width="900" height="340" fill="#0d1117" rx="12"/>

  <!-- Title -->
  <text x="450" y="40" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="20" font-weight="700" fill="#e6edf3" text-anchor="middle">Configuration Precedence</text>
  <text x="450" y="62" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="13" fill="#8b949e" text-anchor="middle">Higher layers override lower layers — last writer wins within the same layer</text>

  <!-- Priority arrow on left -->
  <line x1="52" y1="280" x2="52" y2="92" stroke="#30363d" stroke-width="1.5" stroke-dasharray="4,3"/>
  <polygon points="46,92 52,78 58,92" fill="#e6edf3"/>
  <text x="42" y="190" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="10" fill="#8b949e" text-anchor="middle" transform="rotate(-90 42 190)">HIGHER PRIORITY</text>

  <!-- Layer 1: CLI Arguments (narrowest trapezoid) -->
  <!-- Pyramid: center=500, layers y at 82,126,170,214,258 -->
  <!-- Layer widths from narrowest to widest: 220, 320, 440, 580, 740 -->
  <!-- x = 450 - width/2 -->

  <!-- Layer 1: CLI — width 220 → x=340 -->
  <polygon points="340,82 560,82 590,122 310,122" fill="#f85149" opacity="0.2"/>
  <polygon points="340,82 560,82 590,122 310,122" fill="none" stroke="#f85149" stroke-width="1.5"/>
  <text x="450" y="108" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="13" font-weight="700" fill="#f85149" text-anchor="middle">CLI Arguments</text>
  <!-- Right label -->
  <text x="610" y="108" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="11" fill="#8b949e">--db-path, --port, --embed-model</text>
  <text x="610" y="122" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="10" fill="#f85149">← highest priority</text>

  <!-- Layer 2: Env Vars — width 300 → x=300 -->
  <polygon points="310,122 590,122 624,162 276,162" fill="#f0883e" opacity="0.18"/>
  <polygon points="310,122 590,122 624,162 276,162" fill="none" stroke="#f0883e" stroke-width="1.5"/>
  <text x="450" y="148" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="13" font-weight="700" fill="#f0883e" text-anchor="middle">Environment Variables</text>
  <text x="644" y="148" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="11" fill="#8b949e">AXON_DB_PATH, AXON_PORT</text>

  <!-- Layer 3: ~/.claude.json — width 420 → x=240 -->
  <polygon points="276,162 624,162 660,202 240,202" fill="#3fb950" opacity="0.15"/>
  <polygon points="276,162 624,162 660,202 240,202" fill="none" stroke="#3fb950" stroke-width="1.5"/>
  <text x="450" y="188" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="13" font-weight="700" fill="#3fb950" text-anchor="middle">~/.claude.json MCP env block</text>
  <text x="680" y="188" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="11" fill="#8b949e">Claude Code MCP server config</text>

  <!-- Layer 4: .axon/config.toml — width 560 → x=170 -->
  <polygon points="240,202 660,202 696,242 204,242" fill="#58a6ff" opacity="0.15"/>
  <polygon points="240,202 660,202 696,242 204,242" fill="none" stroke="#58a6ff" stroke-width="1.5"/>
  <text x="450" y="228" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="13" font-weight="700" fill="#58a6ff" text-anchor="middle">.axon/config.toml</text>
  <text x="716" y="228" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="11" fill="#8b949e">Project-local configuration file</text>

  <!-- Layer 5: Built-in Defaults — width 720 → x=90 -->
  <polygon points="204,242 696,242 730,282 170,282" fill="#8b949e" opacity="0.15"/>
  <polygon points="204,242 696,242 730,282 170,282" fill="none" stroke="#8b949e" stroke-width="1.5"/>
  <text x="450" y="268" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="13" font-weight="700" fill="#8b949e" text-anchor="middle">Built-in Defaults</text>
  <text x="750" y="262" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="11" fill="#8b949e">Compiled into the axon binary</text>
  <text x="750" y="276" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="10" fill="#8b949e">← lowest priority</text>

  <!-- Bottom note -->
  <text x="450" y="312" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="11" fill="#8b949e" text-anchor="middle">Lower layers provide sensible defaults; upper layers allow runtime and per-project overrides without modifying source.</text>
</svg>
