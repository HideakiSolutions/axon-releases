  <rect x="24" y="290" width="264" height="48" rx="6" fill="#161b22" stroke="#30363d" stroke-width="1"/>
  <circle cx="54" cy="314" r="14" fill="#3fb950" opacity="0.2"/>
  <circle cx="54" cy="314" r="14" fill="none" stroke="#3fb950" stroke-width="1.5"/>
