  <rect x="318" y="130" width="264" height="48" rx="6" fill="#161b22" stroke="#30363d" stroke-width="1"/>
  <circle cx="348" cy="154" r="14" fill="#58a6ff" opacity="0.2"/>
  <circle cx="348" cy="154" r="14" fill="none" stroke="#58a6ff" stroke-width="1.5"/>
  <text x="348" y="159" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="12" font-weight="700" fill="#58a6ff" text-anchor="middle">1</text>
  <text x="370" y="150" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="12" font-weight="600" fill="#e6edf3">Download tarball</text>
  <text x="370" y="166" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="11" fill="#8b949e">From GitHub Releases page</text>

  <line x1="450" y1="178" x2="450" y2="196" stroke="#58a6ff" stroke-width="1.5" stroke-dasharray="3,3"/>
  <polygon points="444,196 450,208 456,196" fill="#58a6ff"/>

  <!-- Step 2 -->
  <rect x="318" y="210" width="264" height="48" rx="6" fill="#161b22" stroke="#30363d" stroke-width="1"/>
  <circle cx="348" cy="234" r="14" fill="#58a6ff" opacity="0.2"/>
  <circle cx="348" cy="234" r="14" fill="none" stroke="#58a6ff" stroke-width="1.5"/>
  <text x="348" y="239" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="12" font-weight="700" fill="#58a6ff" text-anchor="middle">2</text>
  <text x="370" y="230" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="12" font-weight="600" fill="#e6edf3">tar xzf axon-*.tar.gz</text>
  <text x="370" y="246" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="11" fill="#8b949e">Extract archive</text>

  <line x1="450" y1="258" x2="450" y2="276" stroke="#58a6ff" stroke-width="1.5" stroke-dasharray="3,3"/>
  <polygon points="444,276 450,288 456,276" fill="#58a6ff"/>

  <!-- Step 3 -->
  <rect x="318" y="290" width="264" height="48" rx="6" fill="#161b22" stroke="#30363d" stroke-width="1"/>
  <circle cx="348" cy="314" r="14" fill="#58a6ff" opacity="0.2"/>
  <circle cx="348" cy="314" r="14" fill="none" stroke="#58a6ff" stroke-width="1.5"/>
  <text x="348" y="319" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="12" font-weight="700" fill="#58a6ff" text-anchor="middle">3</text>
  <text x="370" y="310" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="12" font-weight="600" fill="#e6edf3">./install.sh</text>
  <text x="370" y="326" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="11" fill="#8b949e">Installs + runs axon-setup</text>

  <rect x="318" y="350" width="264" height="16" rx="4" fill="#58a6ff" opacity="0.15"/>
  <text x="450" y="362" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="11" font-weight="700" fill="#58a6ff" text-anchor="middle">✓ Done — ~3 min</text>

