<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="900" height="380" viewBox="0 0 900 380">
  <!-- Background -->
  <rect width="900" height="380" fill="#0d1117" rx="12"/>

  <!-- Title -->
  <text x="450" y="40" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="20" font-weight="700" fill="#e6edf3" text-anchor="middle">Installation Paths</text>
  <text x="450" y="62" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="13" fill="#8b949e" text-anchor="middle">Choose the path for your OS — all result in the same configured environment</text>

  <!-- ====== Column 1: macOS / Linux (Homebrew) ====== -->
  <!-- Header -->
  <rect x="24" y="78" width="264" height="36" rx="6" fill="#3fb950" opacity="0.2"/>
  <rect x="24" y="78" width="264" height="36" rx="6" fill="none" stroke="#3fb950" stroke-width="1.5"/>
  <text x="156" y="101" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="13" font-weight="700" fill="#3fb950" text-anchor="middle">macOS / Linux (Homebrew)</text>

  <!-- Step 1 -->
  <rect x="24" y="130" width="264" height="48" rx="6" fill="#161b22" stroke="#30363d" stroke-width="1"/>
  <circle cx="54" cy="154" r="14" fill="#3fb950" opacity="0.2"/>
  <circle cx="54" cy="154" r="14" fill="none" stroke="#3fb950" stroke-width="1.5"/>
  <text x="54" y="159" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="12" font-weight="700" fill="#3fb950" text-anchor="middle">1</text>
  <text x="76" y="150" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="12" font-weight="600" fill="#e6edf3">brew tap axon/tap</text>
  <text x="76" y="166" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="11" fill="#8b949e">Add the Homebrew tap</text>

  <!-- Arrow -->
  <line x1="156" y1="178" x2="156" y2="196" stroke="#3fb950" stroke-width="1.5" stroke-dasharray="3,3"/>
  <polygon points="150,196 156,208 162,196" fill="#3fb950"/>

  <!-- Step 2 -->
  <rect x="24" y="210" width="264" height="48" rx="6" fill="#161b22" stroke="#30363d" stroke-width="1"/>
  <circle cx="54" cy="234" r="14" fill="#3fb950" opacity="0.2"/>
  <circle cx="54" cy="234" r="14" fill="none" stroke="#3fb950" stroke-width="1.5"/>
  <text x="54" y="239" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="12" font-weight="700" fill="#3fb950" text-anchor="middle">2</text>
  <text x="76" y="230" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="12" font-weight="600" fill="#e6edf3">brew install axon</text>
  <text x="76" y="246" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="11" fill="#8b949e">Install binary + deps</text>

