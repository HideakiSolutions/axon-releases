  <text x="664" y="166" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="11" fill="#8b949e">axon-windows-x64.zip</text>

  <line x1="744" y1="178" x2="744" y2="196" stroke="#bc8cff" stroke-width="1.5" stroke-dasharray="3,3"/>
  <polygon points="738,196 744,208 750,196" fill="#bc8cff"/>

  <!-- Step 2 -->
  <rect x="612" y="210" width="264" height="48" rx="6" fill="#161b22" stroke="#30363d" stroke-width="1"/>
  <circle cx="642" cy="234" r="14" fill="#bc8cff" opacity="0.2"/>
  <circle cx="642" cy="234" r="14" fill="none" stroke="#bc8cff" stroke-width="1.5"/>
  <text x="642" y="239" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="12" font-weight="700" fill="#bc8cff" text-anchor="middle">2</text>
  <text x="664" y="230" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="12" font-weight="600" fill="#e6edf3">Expand-Archive .\axon.zip</text>
  <text x="664" y="246" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="11" fill="#8b949e">Extract in PowerShell</text>

  <line x1="744" y1="258" x2="744" y2="276" stroke="#bc8cff" stroke-width="1.5" stroke-dasharray="3,3"/>
  <polygon points="738,276 744,288 750,276" fill="#bc8cff"/>

  <!-- Step 3 -->
  <rect x="612" y="290" width="264" height="48" rx="6" fill="#161b22" stroke="#30363d" stroke-width="1"/>
  <circle cx="642" cy="314" r="14" fill="#bc8cff" opacity="0.2"/>
  <circle cx="642" cy="314" r="14" fill="none" stroke="#bc8cff" stroke-width="1.5"/>
  <text x="642" y="319" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="12" font-weight="700" fill="#bc8cff" text-anchor="middle">3</text>
  <text x="664" y="310" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="12" font-weight="600" fill="#e6edf3">.\install.ps1</text>
  <text x="664" y="326" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="11" fill="#8b949e">Run as Administrator</text>

  <rect x="612" y="350" width="264" height="16" rx="4" fill="#bc8cff" opacity="0.15"/>
  <text x="744" y="362" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="11" font-weight="700" fill="#bc8cff" text-anchor="middle">✓ Done — ~3 min</text>

  <!-- Footer note -->
  <text x="450" y="392" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="11" fill="#8b949e" text-anchor="middle">All paths install: axon binary + axon-setup + Claude Code hooks + MCP server configuration</text>
