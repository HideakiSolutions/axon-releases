  <text x="479" y="167" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="16" fill="#f85149" text-anchor="middle">✗</text>
  <text x="609" y="167" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="16" fill="#f85149" text-anchor="middle">✗</text>
  <text x="739" y="167" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="16" fill="#f85149" text-anchor="middle">✗</text>

