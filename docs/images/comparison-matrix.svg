  <rect x="24" y="78" width="852" height="36" rx="6" fill="none" stroke="#30363d" stroke-width="1"/>

  <text x="148" y="101" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="12" font-weight="700" fill="#8b949e" text-anchor="middle">Feature</text>

