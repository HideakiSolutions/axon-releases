<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="900" height="400" viewBox="0 0 900 400">
  <!-- Background -->
  <rect width="900" height="400" fill="#0d1117" rx="12"/>

