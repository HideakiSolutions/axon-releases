  <text x="609" y="231" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="16" fill="#f85149" text-anchor="middle">✗</text>
  <text x="739" y="231" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="16" fill="#f85149" text-anchor="middle">✗</text>

