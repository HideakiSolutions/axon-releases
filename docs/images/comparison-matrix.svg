  <text x="450" y="40" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="20" font-weight="700" fill="#e6edf3" text-anchor="middle">Tool Comparison</text>
  <text x="450" y="62" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="13" fill="#8b949e" text-anchor="middle">axon vs. traditional code exploration tools</text>

  <!-- Table layout: x=24, cols at 24+, row height=32 -->
  <!-- Col widths: Feature=260, axon=130, grep=130, ctags=130, LSP=130 -->
